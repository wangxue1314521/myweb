<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 30px;
        }

        .container {
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        #score {
            font-size: 20px;
            margin: 10px 0;
            color: #2c3e50;
        }

        #gameCanvas {
            border: 3px solid #2c3e50;
            background-color: #fff;
            border-radius: 5px;
        }

        .tips {
            margin-top: 15px;
            color: #7f8c8d;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>经典贪吃蛇</h1>
        <div id="score">得分: 0</div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="tips">↑↓←→ 控制方向 | 不要撞墙或撞自己</div>
    </div>

    <script>
        // 获取画布和上下文
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // 游戏设置
        const gridSize = 20;   // 每个格子大小
        const tileCount = canvas.width / gridSize; // 一行/列有多少格子

        // 蛇的初始状态
        let snake = [
            {x: 10, y: 10}
        ];
        let dx = 0;  // X方向速度
        let dy = 0;  // Y方向速度

        // 食物位置
        let food = {x: 15, y: 15};
        let score = 0;
        let gameLoop;
        let gameOver = false;

        // 开始游戏
        startGame();

        // 键盘控制
        document.addEventListener('keydown', changeDirection);

        function startGame() {
            gameOver = false;
            gameLoop = setInterval(drawGame, 100);
        }

        // 绘制游戏画面
        function drawGame() {
            if(gameOver) {
                clearInterval(gameLoop);
                alert("游戏结束！最终得分：" + score + "\n点击确定重新开始");
                window.location.reload();
                return;
            }

            // 背景
            ctx.fillStyle = '#ecf0f1';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制食物
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);

            // 移动蛇
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);

            // 判断是否吃到食物
            if(head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = "得分: " + score;
                generateFood(); // 生成新食物
            } else {
                snake.pop(); // 没吃到就去掉尾巴
            }

            // 绘制蛇身体
            ctx.fillStyle = '#2ecc71';
            snake.forEach((segment, index) => {
                // 蛇头颜色深一点
                if(index === 0) ctx.fillStyle = '#27ae60';
                else ctx.fillStyle = '#2ecc71';
                
                ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
            });

            // 碰撞检测
            checkCollision();
        }

        // 随机生成食物
        function generateFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);

            // 避免食物生成在蛇身上
            snake.forEach(segment => {
                if(segment.x === food.x && segment.y === food.y) {
                    generateFood();
                }
            });
        }

        // 方向控制
        function changeDirection(event) {
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            const keyPressed = event.keyCode;
            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingLeft = dx === -1;
            const goingRight = dx === 1;

            if(keyPressed === UP_KEY && !goingDown) {
                dx = 0;
                dy = -1;
            }
            if(keyPressed === DOWN_KEY && !goingUp) {
                dx = 0;
                dy = 1;
            }
            if(keyPressed === LEFT_KEY && !goingRight) {
                dx = -1;
                dy = 0;
            }
            if(keyPressed === RIGHT_KEY && !goingLeft) {
                dx = 1;
                dy = 0;
            }
        }

        // 碰撞检测
        function checkCollision() {
            // 撞墙
            if(snake[0].x < 0 || snake[0].x >= tileCount ||
               snake[0].y < 0 || snake[0].y >= tileCount) {
                gameOver = true;
            }

            // 撞自己
            for(let i = 1; i < snake.length; i++) {
                if(snake[i].x === snake[0].x && snake[i].y === snake[0].y) {
                    gameOver = true;
                }
            }
        }
    </script>
</body>
</html>
